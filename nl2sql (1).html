<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JM20 Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&family=Google+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── CONFIG ─────────────────────────────────────────── */
    :root {
      --bg:          #080c14;
      --surface:     #0f1521;
      --surface2:    #161e2e;
      --border:      #1c2a3d;
      --border2:     #243447;
      --accent:      #f5a623;
      --accent-dim:  #b87a1a;
      --accent-glow: rgba(245,166,35,0.15);
      --text:        #dde4f0;
      --text-muted:  #5a7090;
      --text-dim:    #8a9ab5;
      --green:       #22c55e;
      --red:         #ef4444;
      --mono:        'IBM Plex Mono', monospace;
      --sans:        'Outfit', sans-serif;
      --display:     'Syne', sans-serif;
      --radius:      10px;
      --radius-lg:   16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NOISE TEXTURE ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 26px; height: 26px; }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .logo-name {
      font-family: 'Google Sans', 'Product Sans', var(--display);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      line-height: 1;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 100px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── QUERY BOX ──────────────────────────────────────── */
    .query-section {
      margin-bottom: 36px;
    }

    .query-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .query-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .query-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .btn-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-clear {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0 18px;
      height: 36px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .btn-clear:hover {
      color: var(--red);
      border-color: rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.06);
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.97rem;
      font-weight: 400;
      line-height: 1.6;
      padding: 16px 18px;
      resize: none;
      min-height: 80px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea::placeholder { color: var(--text-muted); }

    textarea:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-run {
      flex-shrink: 0;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--display);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 0 26px;
      height: 52px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-run:hover  { background: #fbbf24; }
    .btn-run:active { transform: scale(0.97); }
    .btn-run:disabled {
      background: var(--border2);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* ── QUERY TOOLS (history / favorites dropdowns) ────── */
    .query-tools {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .dropdown {
      position: relative;
    }

    .btn-dropdown {
      font-size: 0.78rem;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      font-family: var(--sans);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-dropdown:hover {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: var(--accent-glow);
    }

    .btn-dropdown .arrow {
      font-size: 0.65rem;
      transition: transform 0.2s;
      display: inline-block;
    }

    .btn-dropdown.open .arrow { transform: rotate(180deg); }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 260px;
      max-width: 360px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
      overflow: hidden;
    }

    .dropdown-menu.open { display: block; }

    .dropdown-menu-header {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 14px 6px;
      border-bottom: 1px solid var(--border);
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 14px;
      font-size: 0.82rem;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s, color 0.1s;
    }

    .dropdown-item:last-child { border-bottom: none; }

    .dropdown-item:hover {
      background: var(--accent-glow);
      color: var(--text);
    }

    .dropdown-item-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .dropdown-item-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .dropdown-item-btn {
      background: none;
      border: none;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1.4;
      transition: color 0.15s, background 0.15s;
    }

    .dropdown-item-btn:hover { color: var(--accent); background: var(--accent-glow); }
    .dropdown-item-btn.del:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    .dropdown-empty {
      padding: 14px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
    }

    .btn-fav-save {
      font-size: 0.78rem;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius);
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      font-family: var(--sans);
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-fav-save:hover {
      background: rgba(245,166,35,0.25);
    }

    /* ── LOADER ─────────────────────────────────────────── */
    .loader {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 20px 0;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .loader.visible { display: flex; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTS AREA ───────────────────────────────────── */
    #results { animation: fadeUp 0.3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── META BAR ───────────────────────────────────────── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.03em;
    }

    .badge-rows {
      background: rgba(34,197,94,0.1);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.25);
    }

    .badge-zero {
      background: rgba(245,166,35,0.1);
      color: var(--accent);
      border: 1px solid rgba(245,166,35,0.25);
    }

    .meta-question {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-style: italic;
      max-width: 480px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── SQL REVEAL ─────────────────────────────────────── */
    .sql-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sql-toggle:hover {
      color: var(--accent);
      border-color: var(--accent-dim);
    }

    .sql-toggle .arrow {
      transition: transform 0.2s;
      display: inline-block;
    }

    .sql-toggle.open .arrow { transform: rotate(180deg); }

    .sql-box {
      display: none;
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .sql-box.visible { display: block; }

    .sql-box code {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: #93c5fd;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── TABLE WRAPPER ──────────────────────────────────── */
    .table-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .btn-download {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text-dim);
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .btn-download:hover {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: var(--accent-glow);
    }

    .btn-download svg { width: 14px; height: 14px; }

    .table-scroll {
      overflow-x: auto;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border2);
    }

    thead th {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 16px;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 11px 16px;
      color: var(--text);
      font-family: var(--sans);
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 2.4rem;
      margin-bottom: 14px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    /* ── ERROR CARD ─────────────────────────────────────── */
    .error-card {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .error-icon {
      color: var(--red);
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .error-title {
      font-weight: 600;
      color: #fca5a5;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }

    .error-msg {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── FOOTER ─────────────────────────────────────────── */
    footer {
      margin-top: auto;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .query-wrap { flex-direction: column; align-items: stretch; }
      .btn-col { flex-direction: row; }
      .btn-run { height: 48px; justify-content: center; flex: 1; }
      .btn-clear { height: 48px; }
      header { flex-direction: column; align-items: flex-start; gap: 14px; }
    }
    /* ── LOGIN SCREEN ───────────────────────────────────── */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #loginScreen.hidden { display: none; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .login-logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-title {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .login-field {
      margin-bottom: 16px;
    }

    .login-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: block;
    }

    .login-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--display);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .login-btn:hover  { background: #fbbf24; }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { background: var(--border2); color: var(--text-muted); cursor: not-allowed; }

    .login-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius);
      color: #fca5a5;
      font-size: 0.82rem;
      padding: 10px 14px;
      margin-top: 14px;
      display: none;
    }

    .login-error.visible { display: block; }

    /* ── LOGOUT BUTTON ──────────────────────────────────── */
    .btn-logout {
      font-size: 0.78rem;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      cursor: pointer;
      font-family: var(--sans);
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-logout:hover {
      color: var(--red);
      border-color: rgba(239,68,68,0.4);
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-email {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<!-- ── LOGIN SCREEN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">JM20</span>
        <span class="logo-sub">Agentic Analytics · NL2SQL</span>
      </div>
    </div>
    <div class="login-title">Owner Sign In</div>
    <div class="login-sub">Sign in with your JM20 account to access the analytics dashboard.</div>
    <div class="login-field">
      <label class="login-label" for="loginEmail">Email</label>
      <input class="login-input" id="loginEmail" type="email" placeholder="owner@yourcompany.com" autocomplete="email"/>
    </div>
    <div class="login-field">
      <label class="login-label" for="loginPassword">Password</label>
      <input class="login-input" id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="login-btn" id="loginBtn" onclick="signIn()">Sign In →</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="shell" id="mainShell" style="display:none">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">
      <div class="logo-mark">
        <!-- AI agent / neural network icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <circle cx="4"  cy="6"  r="2"/>
          <circle cx="20" cy="6"  r="2"/>
          <circle cx="4"  cy="18" r="2"/>
          <circle cx="20" cy="18" r="2"/>
          <line x1="6"  y1="7"  x2="10" y2="10"/>
          <line x1="18" y1="7"  x2="14" y2="10"/>
          <line x1="6"  y1="17" x2="10" y2="14"/>
          <line x1="18" y1="17" x2="14" y2="14"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">JM20</span>
        <span class="logo-sub">Agentic Analytics · NL2SQL</span>
      </div>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      Live DB Connected
    </div>
    <div class="user-pill">
      <span class="user-email" id="userEmail"></span>
      <button class="btn-logout" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <!-- ── QUERY INPUT ── -->
  <section class="query-section">
    <div class="query-label">Ask the database</div>
    <div class="query-wrap">
      <textarea
        id="questionInput"
        placeholder="e.g. How many open tickets do we have this week? Show me all orders over €500 in the last 30 days."
        rows="3"
      ></textarea>
      <div class="btn-col">
        <button class="btn-clear" onclick="clearQuery()">Clear</button>
        <button class="btn-run" id="runBtn" onclick="runQuery()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Run
        </button>
      </div>
    </div>

    <div class="query-tools">
      <!-- History dropdown -->
      <div class="dropdown" id="historyDropdown">
        <button class="btn-dropdown" id="historyBtn" onclick="toggleDropdown('history')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          History
          <span class="arrow">▾</span>
        </button>
        <div class="dropdown-menu" id="historyMenu">
          <div class="dropdown-menu-header">Recent queries</div>
          <div id="historyList"></div>
        </div>
      </div>

      <!-- Favorites dropdown -->
      <div class="dropdown" id="favoritesDropdown">
        <button class="btn-dropdown" id="favoritesBtn" onclick="toggleDropdown('favorites')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Favorites
          <span class="arrow">▾</span>
        </button>
        <div class="dropdown-menu" id="favoritesMenu">
          <div class="dropdown-menu-header">Saved queries</div>
          <div id="favoritesList"></div>
        </div>
      </div>

      <!-- Save to favorites -->
      <button class="btn-fav-save" onclick="addFavorite()" title="Save current query to favorites">★ Save to favorites</button>
    </div>
  </section>

  <!-- ── LOADER ── -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span id="loaderText">Generating SQL query...</span>
  </div>

  <!-- ── RESULTS ── -->
  <div id="results"></div>

  <!-- ── FOOTER ── -->
  <footer>
    <span>JM20 Analytics · NL2SQL Pipeline</span>
    <span id="lastRun"></span>
  </footer>

</div>

<script>
  // ── CONFIG ───────────────────────────────────────────────────────────────
  const WEBHOOK_URL   = 'https://gpixie.app.n8n.cloud/webhook/owner-query';
  const SUPABASE_URL  = 'https://wiavnyuchdsfztzhvaua.supabase.co';
  const SUPABASE_ANON = 'YOUR_ANON_KEY_HERE'; // ← paste your anon key
  // ────────────────────────────────────────────────────────────────────────

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  let currentJWT = null;

  // Always force login on page load — no cached sessions
  sb.auth.signOut();

  // ── AUTH STATE ───────────────────────────────────────────────────────────
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentJWT = session.access_token;
      document.getElementById('userEmail').textContent = session.user.email;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainShell').style.display = 'flex';
    } else {
      currentJWT = null;
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('mainShell').style.display = 'none';
    }
  });

  // ── SIGN IN ──────────────────────────────────────────────────────────────
  async function signIn() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.classList.add('visible');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';
    errEl.classList.remove('visible');

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = error.message || 'Invalid email or password.';
      errEl.classList.add('visible');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In →';
    }
    // on success onAuthStateChange fires automatically
  }

  // ── SIGN OUT ─────────────────────────────────────────────────────────────
  async function signOut() {
    await sb.auth.signOut();
  }

  // Enter key on login inputs
  ['loginEmail','loginPassword'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') signIn();
    });
  });

  const input   = document.getElementById('questionInput');
  const btn     = document.getElementById('runBtn');
  const loader  = document.getElementById('loader');
  const results = document.getElementById('results');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runQuery(); }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#historyDropdown'))   closeDropdown('history');
    if (!e.target.closest('#favoritesDropdown')) closeDropdown('favorites');
  });

  function setQ(text) { input.value = text; input.focus(); }
  function clearQuery() { input.value = ''; input.focus(); }

  // ── STORAGE ──────────────────────────────────────────────────────────────
  const HISTORY_KEY   = 'jm20_query_history';
  const FAVORITES_KEY = 'jm20_query_favorites';
  const MAX_HISTORY   = 20;

  function getHistory()     { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)   || '[]'); } catch { return []; } }
  function getFavorites()   { try { return JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]'); } catch { return []; } }
  function saveHistory(a)   { localStorage.setItem(HISTORY_KEY,   JSON.stringify(a)); }
  function saveFavorites(a) { localStorage.setItem(FAVORITES_KEY, JSON.stringify(a)); }

  let _hist = [];
  let _favs = [];

  function addToHistory(q) {
    const h = getHistory().filter(x => x !== q);
    h.unshift(q);
    saveHistory(h.slice(0, MAX_HISTORY));
  }

  function addFavorite() {
    const q = input.value.trim();
    if (!q) { input.focus(); return; }
    _addToFavorites(q);
    const b = document.querySelector('.btn-fav-save');
    b.textContent = '★ Saved!';
    setTimeout(() => { b.textContent = '★ Save to Favorites'; }, 1600);
  }

  function _addToFavorites(q) {
    const f = getFavorites().filter(x => x !== q);
    f.unshift(q);
    saveFavorites(f);
  }

  function _histLoad(i)  { setQ(_hist[i]); closeDropdown('history'); closeDropdown('favorites'); }
  function _histStar(i)  { _addToFavorites(_hist[i]); renderHistoryList(); }
  function _histDel(i)   { const h = getHistory(); h.splice(i, 1); saveHistory(h); renderHistoryList(); }
  function _favLoad(i)   { setQ(_favs[i]); closeDropdown('history'); closeDropdown('favorites'); }
  function _favDel(i)    { const f = getFavorites(); f.splice(i, 1); saveFavorites(f); renderFavoritesList(); }

  function renderHistoryList() {
    const list = document.getElementById('historyList');
    _hist = getHistory();
    if (_hist.length === 0) {
      list.innerHTML = '<div class="dropdown-empty">No history yet — run a query first</div>';
      return;
    }
    list.innerHTML = _hist.map((q, i) => `
      <div class="dropdown-item">
        <span class="dropdown-item-text" onclick="_histLoad(${i})" title="${escHtml(q)}">${escHtml(q)}</span>
        <span class="dropdown-item-actions">
          <button class="dropdown-item-btn" onclick="event.stopPropagation();_histStar(${i})" title="Save to Favorites">☆</button>
          <button class="dropdown-item-btn del" onclick="event.stopPropagation();_histDel(${i})" title="Remove">✕</button>
        </span>
      </div>
    `).join('');
  }

  function renderFavoritesList() {
    const list = document.getElementById('favoritesList');
    _favs = getFavorites();
    if (_favs.length === 0) {
      list.innerHTML = '<div class="dropdown-empty">No favorites yet — star a query from History</div>';
      return;
    }
    list.innerHTML = _favs.map((q, i) => `
      <div class="dropdown-item">
        <span class="dropdown-item-text" onclick="_favLoad(${i})" title="${escHtml(q)}">${escHtml(q)}</span>
        <span class="dropdown-item-actions">
          <button class="dropdown-item-btn del" onclick="event.stopPropagation();_favDel(${i})" title="Remove">✕</button>
        </span>
      </div>
    `).join('');
  }

  function toggleDropdown(name) {
    const menu  = document.getElementById(name + 'Menu');
    const btnEl = document.getElementById(name + 'Btn');
    const isOpen = menu.classList.contains('open');
    if (name === 'history')   renderHistoryList();
    if (name === 'favorites') renderFavoritesList();
    const other = name === 'history' ? 'favorites' : 'history';
    closeDropdown(other);
    menu.classList.toggle('open', !isOpen);
    btnEl.classList.toggle('open', !isOpen);
  }

  function closeDropdown(name) {
    document.getElementById(name + 'Menu')?.classList.remove('open');
    document.getElementById(name + 'Btn')?.classList.remove('open');
  }

  function setLoader(msg) {
    document.getElementById('loaderText').textContent = msg;
  }

  async function runQuery() {
    const question = input.value.trim();
    if (!question) return;
    if (!currentJWT) {
      showError('Not authenticated. Please sign in again.', '', '');
      return;
    }

    addToHistory(question);
    results.innerHTML = '';
    btn.disabled = true;
    loader.classList.add('visible');
    setLoader('Generating SQL query...');

    try {
      setLoader('Running query against database...');
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ question })
      });

      setLoader('Formatting results...');
      const data = await res.json();

      if (!data.success) {
        showError(data.error || 'Unknown error', data.hint || '', data.sql || '');
      } else {
        showResults(data);
      }

      document.getElementById('lastRun').textContent =
        'Last run: ' + new Date().toLocaleTimeString();

    } catch (err) {
      showError('Could not reach the analytics server.', 'Check that your n8n workflow is active and the webhook URL is correct.', '');
    } finally {
      btn.disabled = false;
      loader.classList.remove('visible');
    }
  }

  function showResults(data) {
    const rowCount   = data.row_count || 0;
    const badgeClass = rowCount === 0 ? 'badge-zero' : 'badge-rows';
    const badgeLabel = rowCount === 0 ? '0 rows' : `${rowCount} row${rowCount !== 1 ? 's' : ''}`;
    results.innerHTML = `
      <div class="meta-bar">
        <div class="meta-left">
          <span class="badge ${badgeClass}">${badgeLabel}</span>
          <span class="meta-question">"${escHtml(data.question)}"</span>
        </div>
        <button class="sql-toggle" id="sqlToggle" onclick="toggleSQL()">
          <span>SQL</span><span class="arrow">▾</span>
        </button>
      </div>
      <div class="sql-box" id="sqlBox"><code>${escHtml(data.sql)}</code></div>
      ${rowCount > 0 ? `
        <div class="table-actions">
          <button class="btn-download" onclick="downloadCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download CSV
          </button>
        </div>
        <div class="table-scroll">${buildTable(data.raw_data)}</div>
      ` : `
        <div class="empty-state">
          <div class="empty-state-icon">◎</div>
          <p>No results found for this query.</p>
        </div>
      `}
    `;
    window._rawData = data.raw_data;
  }

  function showError(message, hint, sql) {
    results.innerHTML = `
      <div class="error-card">
        <div class="error-icon">✕</div>
        <div>
          <div class="error-title">Query Failed</div>
          <div class="error-msg">${escHtml(message)}</div>
          ${hint ? `<div class="error-msg" style="margin-top:6px;opacity:0.7">${escHtml(hint)}</div>` : ''}
          ${sql  ? `<div class="error-msg" style="margin-top:10px;color:#93c5fd">${escHtml(sql)}</div>` : ''}
        </div>
      </div>
    `;
  }

  function buildTable(rows) {
    if (!rows || rows.length === 0) return '';
    const keys = Object.keys(rows[0]);
    const thead = `<thead><tr>${keys.map(k => `<th>${escHtml(k)}</th>`).join('')}</tr></thead>`;
    const tbody = `<tbody>${rows.map(row => `<tr>${keys.map(k => `<td title="${escHtml(String(row[k] ?? ''))}">${escHtml(formatCell(row[k]))}</td>`).join('')}</tr>`).join('')}</tbody>`;
    return `<table>${thead}${tbody}</table>`;
  }

  function formatCell(val) {
    if (val === null || val === undefined) return '—';
    if (typeof val === 'string' && /^\d{4}-\d{2}-\d{2}T/.test(val)) {
      return new Date(val).toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' });
    }
    if (typeof val === 'number' && !Number.isInteger(val)) return val.toFixed(2);
    return String(val);
  }

  function downloadCSV() {
    const rows = window._rawData;
    if (!rows || rows.length === 0) return;
    const keys = Object.keys(rows[0]);
    const escape = v => { const s = String(v ?? ''); return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s; };
    const csv = [keys.map(escape).join(','), ...rows.map(row => keys.map(k => escape(row[k] ?? '')).join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `query_${new Date().toISOString().slice(0,10)}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  function toggleSQL() {
    document.getElementById('sqlBox').classList.toggle('visible');
    document.getElementById('sqlToggle').classList.toggle('open');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
