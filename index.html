<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── CONFIG ─────────────────────────────────────────── */
    :root {
      --bg:          #080c14;
      --surface:     #0f1521;
      --surface2:    #161e2e;
      --border:      #1c2a3d;
      --border2:     #243447;
      --accent:      #f5a623;
      --accent-dim:  #b87a1a;
      --accent-glow: rgba(245,166,35,0.15);
      --text:        #dde4f0;
      --text-muted:  #5a7090;
      --text-dim:    #8a9ab5;
      --green:       #22c55e;
      --red:         #ef4444;
      --mono:        'IBM Plex Mono', monospace;
      --sans:        'Outfit', sans-serif;
      --display:     'Syne', sans-serif;
      --radius:      10px;
      --radius-lg:   16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NOISE TEXTURE ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 20px; height: 20px; }

    .logo-text {
      font-family: var(--display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .logo-text span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 100px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── QUERY BOX ──────────────────────────────────────── */
    .query-section {
      margin-bottom: 36px;
    }

    .query-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .query-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .query-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.97rem;
      font-weight: 400;
      line-height: 1.6;
      padding: 16px 18px;
      resize: none;
      min-height: 80px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea::placeholder { color: var(--text-muted); }

    textarea:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-run {
      flex-shrink: 0;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--display);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 0 26px;
      height: 52px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-run:hover  { background: #fbbf24; }
    .btn-run:active { transform: scale(0.97); }
    .btn-run:disabled {
      background: var(--border2);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* ── EXAMPLES ───────────────────────────────────────── */
    .examples {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .examples-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .chip {
      font-size: 0.76rem;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: var(--sans);
    }

    .chip:hover {
      color: var(--accent);
      border-color: var(--accent-dim);
    }

    /* ── LOADER ─────────────────────────────────────────── */
    .loader {
      display: none;
      align-items: center;
      gap: 14px;
      padding: 20px 0;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .loader.visible { display: flex; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTS AREA ───────────────────────────────────── */
    #results { animation: fadeUp 0.3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── META BAR ───────────────────────────────────────── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.03em;
    }

    .badge-rows {
      background: rgba(34,197,94,0.1);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.25);
    }

    .badge-zero {
      background: rgba(245,166,35,0.1);
      color: var(--accent);
      border: 1px solid rgba(245,166,35,0.25);
    }

    .meta-question {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-style: italic;
      max-width: 480px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── SQL REVEAL ─────────────────────────────────────── */
    .sql-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sql-toggle:hover {
      color: var(--accent);
      border-color: var(--accent-dim);
    }

    .sql-toggle .arrow {
      transition: transform 0.2s;
      display: inline-block;
    }

    .sql-toggle.open .arrow { transform: rotate(180deg); }

    .sql-box {
      display: none;
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .sql-box.visible { display: block; }

    .sql-box code {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: #93c5fd;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── TABLE WRAPPER ──────────────────────────────────── */
    .table-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .btn-download {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text-dim);
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .btn-download:hover {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: var(--accent-glow);
    }

    .btn-download svg { width: 14px; height: 14px; }

    .table-scroll {
      overflow-x: auto;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border2);
    }

    thead th {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 16px;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 11px 16px;
      color: var(--text);
      font-family: var(--sans);
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 2.4rem;
      margin-bottom: 14px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    /* ── ERROR CARD ─────────────────────────────────────── */
    .error-card {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .error-icon {
      color: var(--red);
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .error-title {
      font-weight: 600;
      color: #fca5a5;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }

    .error-msg {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── FOOTER ─────────────────────────────────────────── */
    footer {
      margin-top: auto;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .query-wrap { flex-direction: column; align-items: stretch; }
      .btn-run { height: 48px; justify-content: center; }
      header { flex-direction: column; align-items: flex-start; gap: 14px; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div class="logo-text">Owner <span>Analytics</span></div>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      Live DB Connected
    </div>
  </header>

  <!-- ── QUERY INPUT ── -->
  <section class="query-section">
    <div class="query-label">Ask the database</div>
    <div class="query-wrap">
      <textarea
        id="questionInput"
        placeholder="e.g. How many open tickets do we have this week? Show me all orders over €500 in the last 30 days."
        rows="3"
      ></textarea>
      <button class="btn-run" id="runBtn" onclick="runQuery()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Run
      </button>
    </div>

    <div class="examples">
      <span class="examples-label">Try:</span>
      <span class="chip" onclick="setQ('Show me all escalated tickets from this month')">Escalated tickets this month</span>
      <span class="chip" onclick="setQ('Which customers have the most open orders?')">Top customers by orders</span>
      <span class="chip" onclick="setQ('What is the average resolution time for support tickets?')">Avg resolution time</span>
      <span class="chip" onclick="setQ('List all orders with status cancelled in the last 7 days')">Recent cancellations</span>
      <span class="chip" onclick="setQ('How many tickets were created per day this week?')">Tickets per day</span>
    </div>
  </section>

  <!-- ── LOADER ── -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span id="loaderText">Generating SQL query...</span>
  </div>

  <!-- ── RESULTS ── -->
  <div id="results"></div>

  <!-- ── FOOTER ── -->
  <footer>
    <span>Owner Analytics · NL2SQL Pipeline</span>
    <span id="lastRun"></span>
  </footer>

</div>

<script>
  // ── CONFIG — replace with your n8n webhook URL ──────────────────────────
  const WEBHOOK_URL = 'https://gpixie.app.n8n.cloud/webhook/owner-query';
  // ────────────────────────────────────────────────────────────────────────

  const input   = document.getElementById('questionInput');
  const btn     = document.getElementById('runBtn');
  const loader  = document.getElementById('loader');
  const results = document.getElementById('results');

  // Enter key to submit (Shift+Enter for new line)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      runQuery();
    }
  });

  function setQ(text) {
    input.value = text;
    input.focus();
  }

  function setLoader(msg) {
    document.getElementById('loaderText').textContent = msg;
  }

  async function runQuery() {
    const question = input.value.trim();
    if (!question) return;

    // Reset UI
    results.innerHTML = '';
    btn.disabled = true;
    loader.classList.add('visible');
    setLoader('Generating SQL query...');

    try {
      setLoader('Running query against database...');
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      setLoader('Formatting results...');
      const data = await res.json();

      if (!data.success) {
        showError(data.error || 'Unknown error', data.hint || '', data.sql || '');
      } else {
        showResults(data);
      }

      document.getElementById('lastRun').textContent =
        'Last run: ' + new Date().toLocaleTimeString();

    } catch (err) {
      showError('Could not reach the analytics server.', 'Check that your n8n workflow is active and the webhook URL is correct.', '');
    } finally {
      btn.disabled = false;
      loader.classList.remove('visible');
    }
  }

  // ── RENDER SUCCESS ───────────────────────────────────────────────────────
  function showResults(data) {
    const rowCount   = data.row_count || 0;
    const badgeClass = rowCount === 0 ? 'badge-zero' : 'badge-rows';
    const badgeLabel = rowCount === 0 ? '0 rows' : `${rowCount} row${rowCount !== 1 ? 's' : ''}`;

    results.innerHTML = `
      <div class="meta-bar">
        <div class="meta-left">
          <span class="badge ${badgeClass}">${badgeLabel}</span>
          <span class="meta-question">"${escHtml(data.question)}"</span>
        </div>
        <button class="sql-toggle" id="sqlToggle" onclick="toggleSQL()">
          <span>SQL</span>
          <span class="arrow">▾</span>
        </button>
      </div>

      <div class="sql-box" id="sqlBox">
        <code>${escHtml(data.sql)}</code>
      </div>

      ${rowCount > 0 ? `
        <div class="table-actions">
          <button class="btn-download" onclick="downloadCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download CSV
          </button>
        </div>
        <div class="table-scroll">
          ${buildTable(data.raw_data)}
        </div>
      ` : `
        <div class="empty-state">
          <div class="empty-state-icon">◎</div>
          <p>No results found for this query.</p>
        </div>
      `}
    `;

    // Store raw data for CSV download
    window._rawData = data.raw_data;
  }

  // ── RENDER ERROR ─────────────────────────────────────────────────────────
  function showError(message, hint, sql) {
    results.innerHTML = `
      <div class="error-card">
        <div class="error-icon">✕</div>
        <div>
          <div class="error-title">Query Failed</div>
          <div class="error-msg">${escHtml(message)}</div>
          ${hint ? `<div class="error-msg" style="margin-top:6px;opacity:0.7">${escHtml(hint)}</div>` : ''}
          ${sql ? `<div class="error-msg" style="margin-top:10px;color:#93c5fd">${escHtml(sql)}</div>` : ''}
        </div>
      </div>
    `;
  }

  // ── BUILD HTML TABLE FROM RAW JSON ───────────────────────────────────────
  function buildTable(rows) {
    if (!rows || rows.length === 0) return '';
    const keys = Object.keys(rows[0]);

    const thead = `<thead><tr>${
      keys.map(k => `<th>${escHtml(k)}</th>`).join('')
    }</tr></thead>`;

    const tbody = `<tbody>${
      rows.map(row =>
        `<tr>${keys.map(k => `<td title="${escHtml(String(row[k] ?? ''))}">${escHtml(formatCell(row[k]))}</td>`).join('')}</tr>`
      ).join('')
    }</tbody>`;

    return `<table>${thead}${tbody}</table>`;
  }

  // ── FORMAT CELL VALUES ───────────────────────────────────────────────────
  function formatCell(val) {
    if (val === null || val === undefined) return '—';
    // Detect ISO date strings
    if (typeof val === 'string' && /^\d{4}-\d{2}-\d{2}T/.test(val)) {
      const d = new Date(val);
      return d.toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' });
    }
    // Detect decimal numbers that look like money
    if (typeof val === 'number' && !Number.isInteger(val)) {
      return val.toFixed(2);
    }
    return String(val);
  }

  // ── CSV DOWNLOAD ─────────────────────────────────────────────────────────
  function downloadCSV() {
    const rows = window._rawData;
    if (!rows || rows.length === 0) return;

    const keys = Object.keys(rows[0]);
    const escape = v => {
      const s = String(v ?? '');
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? `"${s.replace(/"/g, '""')}"` : s;
    };

    const csv = [
      keys.map(escape).join(','),
      ...rows.map(row => keys.map(k => escape(row[k] ?? '')).join(','))
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `query_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── SQL TOGGLE ───────────────────────────────────────────────────────────
  function toggleSQL() {
    const box    = document.getElementById('sqlBox');
    const toggle = document.getElementById('sqlToggle');
    box.classList.toggle('visible');
    toggle.classList.toggle('open');
  }

  // ── UTIL ─────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
